<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="quantum-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#9B59B6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1A2332" stroke="url(#quantum-gradient)" stroke-width="2"/>
  <!-- Tic-tac-toe grid -->
  <line x1="38" y1="25" x2="38" y2="75" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
  <line x1="62" y1="25" x2="62" y2="75" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
  <line x1="25" y1="38" x2="75" y2="38" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
  <line x1="25" y1="62" x2="75" y2="62" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
  <!-- X mark -->
  <line x1="28" y1="28" x2="35" y2="35" stroke="#E74C3C" stroke-width="3" stroke-linecap="round"/>
  <line x1="35" y1="28" x2="28" y2="35" stroke="#E74C3C" stroke-width="3" stroke-linecap="round"/>
  <!-- O mark -->
  <circle cx="50" cy="50" r="6" fill="none" stroke="#3498DB" stroke-width="3"/>
  <!-- Quantum superposition indicator (small circles) -->
  <circle cx="74" cy="31" r="4" fill="#9B59B6" opacity="0.8"/>
  <circle cx="31" cy="69" r="4" fill="#9B59B6" opacity="0.8"/>
</svg>
